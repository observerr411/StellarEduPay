version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/stellaredupay
      - STELLAR_NETWORK=${STELLAR_NETWORK}
      - SCHOOL_WALLET_ADDRESS=${SCHOOL_WALLET_ADDRESS}
      - STELLAR_SECRET_KEY=${STELLAR_SECRET_KEY}
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: